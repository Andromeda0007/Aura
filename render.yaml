databases:
  - name: aura-db
    databaseName: aura_db
    user: aura_user
    plan: free

services:
  - type: web
    name: aura-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install torch==2.1.2 torchvision==0.16.2 --index-url https://download.pytorch.org/whl/cpu && pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: DATABASE_URL
        fromDatabase:
          name: aura-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "480"
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        fromService:
          name: aura-frontend
          type: web
          property: url
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: MAX_CONCURRENT_SESSIONS
        value: "100"
      - key: COMPRESSION_TOKEN_LIMIT
        value: "10000"

  - type: web
    name: aura-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    plan: free
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          name: aura-backend
          type: web
          property: url
      - key: NEXT_PUBLIC_WS_URL
        fromService:
          name: aura-backend
          type: web
          property: url
      - key: NEXT_PUBLIC_APP_NAME
        value: Aura
