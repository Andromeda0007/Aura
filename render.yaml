# Render Blueprint for Aura — backend (FastAPI) + Postgres + frontend (Next.js).
# Free tier. Set GROQ_API_KEY / GEMINI_API_KEY and the cross-service URLs in the
# Render dashboard after the first deploy (they're marked sync:false below).
databases:
  - name: aura-db
    plan: free
    region: singapore
    databaseName: aura_db
    user: aura

services:
  - type: web
    name: aura-backend
    runtime: python
    plan: free
    region: singapore
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    # Migrations must succeed before boot; the demo seed is best-effort (idempotent)
    # so a seed hiccup never blocks the service from starting.
    startCommand: alembic upgrade head && (python scripts/seed_demo.py || echo 'seed skipped') && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.13.7"
      - key: DATABASE_URL
        fromDatabase:
          name: aura-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: GROQ_API_KEY
        sync: false   # set in dashboard
      - key: GEMINI_API_KEY
        sync: false   # optional fallback
      - key: ALLOWED_ORIGINS
        sync: false   # set to the aura-frontend URL, e.g. https://aura-frontend.onrender.com
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: LOG_LEVEL
        value: INFO
      - key: COMPRESSION_TOKEN_LIMIT
        value: "10000"

  - type: web
    name: aura-frontend
    runtime: node
    plan: free
    region: singapore
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm run start -- -p $PORT
    # NOTE: NEXT_PUBLIC_* are inlined at BUILD time. Set these in the dashboard
    # before the first build; changing them later needs a manual redeploy/rebuild.
    envVars:
      - key: NEXT_PUBLIC_API_URL
        sync: false   # the aura-backend URL, e.g. https://aura-backend.onrender.com
      - key: NEXT_PUBLIC_WS_URL
        sync: false   # same origin as the API (https://aura-backend.onrender.com — socket.io upgrades to wss)
      - key: NEXT_PUBLIC_APP_NAME
        value: Aura
