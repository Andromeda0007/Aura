# Render Blueprint for Aura — backend (FastAPI) + Postgres + frontend (Next.js).
# Free tier. Set GROQ_API_KEY / GEMINI_API_KEY and the cross-service URLs in the
# Render dashboard after the first deploy (they're marked sync:false below).
databases:
  - name: aura-db
    plan: free
    databaseName: aura_db
    user: aura

services:
  - type: web
    name: aura-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.13.7"
      - key: DATABASE_URL
        fromDatabase:
          name: aura-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: GROQ_API_KEY
        sync: false   # set in dashboard
      - key: GEMINI_API_KEY
        sync: false   # optional fallback
      - key: ALLOWED_ORIGINS
        sync: false   # set to the aura-frontend URL, e.g. https://aura-frontend.onrender.com
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: LOG_LEVEL
        value: INFO
      - key: COMPRESSION_TOKEN_LIMIT
        value: "10000"

  - type: web
    name: aura-frontend
    runtime: node
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm run start -- -p $PORT
    envVars:
      - key: NEXT_PUBLIC_API_URL
        sync: false   # set to the aura-backend URL, e.g. https://aura-backend.onrender.com
      - key: NEXT_PUBLIC_WS_URL
        sync: false   # same host as API (wss://aura-backend.onrender.com)
      - key: NEXT_PUBLIC_APP_NAME
        value: Aura
